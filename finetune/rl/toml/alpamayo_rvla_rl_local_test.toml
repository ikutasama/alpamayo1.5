redis = "12800"

[train]
resume = false
epoch = 15
output_dir = "/data/mnt_m181/z59900495/workspace/alpamayo1.5/output_rl/0425"
epsilon = 1e-6
optm_name = "AdamW"
optm_lr = 2e-6
optm_impl = "fused"
optm_weight_decay = 0.01
optm_betas = [0.9, 0.999]
optm_warmup_steps = 0
optm_grad_norm_clip = 1.0
async_tp_enabled = false
compile = false
param_dtype = "bfloat16"
fsdp_reduce_dtype = "float32"
fsdp_offload = false
fsdp_reshard_after_forward = "default"
train_batch_per_replica = 48
sync_weight_interval = 2
validation_step = 50
validation_batch_per_replica = 4
non_text = true

[validation]
enable = false
# Validation frequency in training steps.
freq = 50
# Validation batch size per rollout replica (defaults to rollout.batch_size if omitted).
batch_size = 4
temperature = 0.6
n_generation = 6


[rollout]
backend = "reasoning_vla_vllm_rollout"
gpu_memory_utilization = 0.7
enable_chunked_prefill = false
n_generation = 12
batch_size = 2
quantization = "none"
seed = 42

[rollout.sampling_config]
temperature = 0.6
top_p = 0.98
repetition_penalty = 1
# stop_strings = ["<|traj_future_end|>", "<|endoftext|>"]
max_new_tokens = 256  # 由于不止是轨迹了，128个不够，cot+meta+traj，必须大于你的 action token 数量

[policy]
# ReasoningVLA HF checkpoint directory (must include ReasoningVLAConfig)
model_name_or_path = "/data/mnt_m181/z59900495/workspace/alpamayo1.5/temp_model"
model_max_length = 4096
model_gradient_checkpointing = true

[logging]
logger = ['console', 'tensorboard']
log_level = "INFO"
project_name = "Alpamayo_RL"
experiment_name = "RVLA_Post_Training"


[train.train_policy]
type = "grpo"
trainer_type = "reasoning_vla_pgmo_grpo"
dataloader_shuffle = false
dataset.split = "train"
# Enable rank-based dispatch (mesh-rank sharding) so each replica consumes a stable shard.
data_dispatch_as_rank_in_mesh = false
temperature = 1.0
epsilon_low = 0.2
epsilon_high = 0.28
lower_bound_ratio = 10.0
kl_beta = 0.0
mu_iterations = 1
mini_batch = 1
min_filter_prefix_tokens = 1
allowed_outdated_steps = 50

[train.ckpt]
enable_checkpoint = true
save_freq = 50
save_mode = "async"
max_keep = 10

[rollout.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = 1
pp_size = 1
dp_replicate_size = 1

[policy.parallelism]
n_init_replicas = 1
tp_size = 1
cp_size = 1
dp_shard_size = 4
pp_size = 1
dp_replicate_size = 1


[custom.alpamayo]
idx_rng_enable = false
idx_rng_seed = 1234
idx_rng_debug = false


[custom.alpamayo.reward]
# ---- Trajectory Quality - Legacy ----
traj_l2_weight = 0.4
comfort_weight = 0.1

# ---- HCC-RM: Hierarchical Causal-Consistent Reward Model ----
# Set enable_hcc = true (or add coc_quality_weight + raa_weight) to activate.
# When disabled, falls back to legacy trajectory-only reward.
enable_hcc = true

# Layer 2 weight: CoC reasoning quality (0.0-1.0, share of total reward)
coc_quality_weight = 0.15

# Layer 3 weight: Reasoning-Action Alignment (0.0-1.0, share of total reward)
raa_weight = 0.15

# Layer 1 threshold: Scene understanding minimum score to pass gating
scene_threshold = 0.3

# CoC dimension weights (factual, coherence, safety, completeness)
# coc_dim_weights = { factual = 0.25, coherence = 0.30, safety = 0.25, completeness = 0.20 }

# ---- Lightweight reward ablations for Causal Flow-GRPO routing ----
# These are ignored unless enabled and are mainly useful when enable_hcc = false.
enable_coc_reward = false
coc_weight = 0.0
enable_consistency_reward = false
consistency_weight = 0.0
enable_risk_reward = false
risk_weight = 0.0

[custom.alpamayo.advantage_routing]
enable = false
coc_weight = 1.0
traj_weight = 1.0
format_weight = 0.2
fallback_weight = 1.0

# ---- PGMO: Pareto-Guided Multi-Objective GRPO ----
[custom.alpamayo.pgmo]
# Master switch: enable PGMO-GRPO extensions
enable = true

# Pareto-optimal sample weighting (boost Pareto-frontier samples)
enable_pareto_weighting = true
# Base weight multiplier for Pareto-optimal samples
pareto_base_weight = 1.5

# Adaptive KL divergence scheduling (consistency-guided)
enable_adaptive_kl = true
# Decay rate for adaptive KL: higher = more sensitive to RAA changes
adaptive_kl_lambda = 2.0

# Contrastive Reasoning-Action Learning
enable_contrastive = true
# Weight for contrastive loss term
contrastive_weight = 0.05
# Temperature for contrastive softmax
contrastive_temperature = 0.07

# Per-dimension objective weights [coc, raa, traj, comfort]
objective_weights = [0.25, 0.25, 0.25, 0.25]

[custom.alpamayo.prefetch]

# Prefetch cache size; <= 0 disables node-prefetch (legacy synchronous dataset fetch path). please set this to be train_batch_per_replica * replica per node.
capacity = 16

# Unix socket directory (node-local). Default is /tmp.
# socket_dir = "/tmp"

num_workers = 5
# Log verbosity for node prefetch server/client.
# One of: "off" | "error" | "warn" | "info" | "debug" | "trace"
# - "trace" is very verbose (includes client RPC payload/resp).
log_level = "info"

# Print per-request detailed logs (cache hit/miss, dataset fetch, per-role shm put, latency).
log_request_details = false
