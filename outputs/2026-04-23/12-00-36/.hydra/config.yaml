data:
  train_dataset:
    vla_preprocess_args:
      _target_: alpamayo1_5.processor.qwen_processor.get_preprocess_data_fn_from_model_config
      components_order:
      - image
      - traj_history
      - prompt
      - traj_future
      components_prompt:
      - traj_future
      label_components:
      - traj_future
      generation_mode: false
    _recursive_: false
    _target_: alpamayo1_5.data.pai.PAIDataset
    local_dir: /data/mnt_m181/z59900495/workspace/DownloadTool-master/pai_dataset
    chunk_ids: 0-299
    use_default_keyframe: true
  val_dataset:
    vla_preprocess_args:
      _target_: alpamayo1_5.processor.qwen_processor.get_preprocess_data_fn_from_model_config
      components_order:
      - image
      - traj_history
      - prompt
      - traj_future
      components_prompt:
      - traj_future
      label_components:
      - traj_future
      generation_mode: true
    _recursive_: false
    _target_: alpamayo1_5.data.pai.PAIDataset
    local_dir: /data/mnt_m181/z59900495/workspace/DownloadTool-master/nvidia/PhysicalAI-Autonomous-Vehicles/Germany_1000
    chunk_ids: 3116-3132
    use_default_keyframe: true
  collate_fn:
    _target_: alpamayo1_5.processor.qwen_processor.collate_fn_from_model_config
    _partial_: true
paths:
  output_dir: output_stage1
callbacks: {}
evaluate:
  max_eval_steps: -1
  torch_dtype: bfloat16
  metric_runner:
    _target_: alpamayo1_5.metrics.metric_runner.MetricRunner
    metrics:
    - _target_: alpamayo1_5.metrics.metric_api.ReasoningSampler
      num_traj_sets: 1
      top_p: 0.98
      temperature: 0.6
      traj_only_generation: false
      max_generation_length: 256
    - _target_: alpamayo1_5.metrics.metric_api.DistanceMetrics
  eval_ckpt: null
trainer:
  output_dir: ${paths.output_dir}
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-05
  warmup_steps: 500
  logging_steps: 5
  save_steps: 500
  save_total_limit: 2
  num_train_epochs: 3
  bf16: true
  dataloader_pin_memory: true
  dataloader_num_workers: 4
  remove_unused_columns: false
  report_to: none
  lr_scheduler_type: cosine_warmup_with_min_lr
  lr_scheduler_kwargs:
    min_lr: 1.0e-06
  deepspeed: finetune/sft/configs/deepspeed/zero2.json
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  lr_multiplier:
    vlm.model.visual: 0.1
  ddp_find_unused_parameters: false
task_name: alpamayo1_5_sft
run_name: ${task_name}_${now:%Y%m%d}_${now:%H%M%S}
model:
  _target_: finetune.sft.models.sft_base_model.TrainableReasoningVLA.from_alpamayo_checkpoint
  checkpoint_path: /data/mnt_m181/z59900495/workspace/model/Alpamayo-1.5-10B
  vlm_name_or_path: /data/mnt_m181/z59900495/workspace/model/Qwen3-VL-8B-Instruct
